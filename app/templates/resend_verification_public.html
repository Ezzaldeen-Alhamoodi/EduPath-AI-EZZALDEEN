{% extends "base.html" %}
{% block page_title %}Resend Verification{% endblock %}
{% block content %}

<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">🧠 EduPath AI EZZALDEEN</div>
        <h2>Resend verification email</h2>
        <p class="muted">Enter your email. If an unverified account exists, we will send a verification link.</p>

        <form method="POST" class="form">
            <label>Email</label>
            <input type="text" name="email" inputmode="email" autocomplete="email" autocapitalize="none" spellcheck="false" placeholder="yourname@example.com" required>
            <button type="submit">📩 Resend verification link</button>
        </form>

        <p class="auth-link"><a href="{{ url_for('login') }}">Back to login</a></p>
    </div>
</section>

{% endblock %}
