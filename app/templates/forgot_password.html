{% extends "base.html" %}
{% block page_title %}Forgot Password{% endblock %}
{% block content %}

<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">🧠 EduPath AI EZZALDEEN</div>
        <h2>Reset your password</h2>
        <p class="muted">Enter your email. If the account exists, we will send a reset link.</p>

        <form method="POST" class="form">
            <label>Email</label>
            <input type="email" name="email" required placeholder="you@example.com">
            <button type="submit">📩 Send reset link</button>
        </form>

        <p class="auth-link"><a href="{{ url_for('login') }}">Back to login</a></p>
    </div>
</section>

{% endblock %}
