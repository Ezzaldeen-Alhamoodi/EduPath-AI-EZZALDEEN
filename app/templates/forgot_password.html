{% extends "base.html" %}
{% block page_title %}استعادة كلمة المرور{% endblock %}
{% block content %}

<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">🧠 EduPath AI EZZALDEEN</div>
        <h2>استعادة كلمة المرور</h2>
        <p class="muted">أدخل بريدك الإلكتروني. إذا كان الحساب موجوداً، فسيتم إرسال رابط إعادة تعيين كلمة المرور.</p>

        <form method="POST" class="form">
            <label>البريد الإلكتروني</label>
            <input type="text" name="email" inputmode="email" autocomplete="email" required placeholder="example@email.com">
            <button type="submit">📩 إرسال رابط الاستعادة</button>
        </form>

        <p class="auth-link"><a href="{{ url_for('login') }}">العودة إلى تسجيل الدخول</a></p>
    </div>
</section>

{% endblock %}
