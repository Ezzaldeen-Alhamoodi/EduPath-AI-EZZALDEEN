{% extends "base.html" %}
{% block page_title %}تعيين كلمة مرور جديدة{% endblock %}
{% block content %}

<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">🧠 EduPath AI EZZALDEEN</div>
        <h2>إنشاء كلمة مرور جديدة</h2>

        <form method="POST" class="form">
            <label>كلمة المرور الجديدة</label>
            <input type="password" name="password" minlength="6" placeholder="ستة أحرف على الأقل" required>

            <label>تأكيد كلمة المرور الجديدة</label>
            <input type="password" name="confirm_password" minlength="6" placeholder="أعد كتابة كلمة المرور" required>

            <button type="submit">🔐 تحديث كلمة المرور</button>
        </form>
    </div>
</section>

{% endblock %}
