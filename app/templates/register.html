{% extends "base.html" %}
{% block page_title %}إنشاء حساب{% endblock %}
{% block content %}

<section class="auth-shell">
    <div class="auth-card wide">
        <div class="auth-brand">🧠 EduPath AI EZZALDEEN</div>
        <h2>إنشاء حسابك الخاص</h2>
        <p class="muted">كل مستخدم يحصل على أهدافه ومهامه وملفه الشخصي وتقدمه بشكل خاص. لا يستطيع أي مستخدم رؤية بيانات مستخدم آخر.</p>

        <form method="POST" class="form">
            <label>الاسم الكامل</label>
            <input name="name" placeholder="اكتب اسمك الكامل" required>

            <label>البريد الإلكتروني</label>
            <input type="text" name="email" inputmode="email" autocomplete="email" placeholder="example@email.com" required>

            <div class="form-row">
                <div>
                    <label>كلمة المرور</label>
                    <input type="password" name="password" minlength="6" placeholder="ستة أحرف على الأقل" required>
                </div>
                <div>
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" name="confirm_password" minlength="6" placeholder="أعد كتابة كلمة المرور" required>
                </div>
            </div>

            <div class="form-row">
                <div>
                    <label>الدولة اختياري</label>
                    <input name="country" placeholder="مثال: اليمن">
                </div>
                <div>
                    <label>التخصص اختياري</label>
                    <input name="major" placeholder="مثال: علوم الحاسوب">
                </div>
            </div>

            <label>الدرجة المستهدفة اختياري</label>
            <input name="target_degree" placeholder="مثال: بكالوريوس">

            <label>اللغات اختياري</label>
            <input name="languages" placeholder="مثال: الإنجليزية، الصينية، الروسية">

            <button type="submit">✨ إنشاء الحساب</button>
        </form>

        <p class="auth-link">
            لديك حساب بالفعل؟
            <a href="{{ url_for('login') }}">تسجيل الدخول</a>
        </p>
    </div>
</section>

{% endblock %}
