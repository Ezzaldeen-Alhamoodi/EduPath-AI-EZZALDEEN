{% extends "base.html" %}
{% block page_title %}تعديل المهمة{% endblock %}
{% block content %}
<section class="card">
    <h2>✏️ تعديل المهمة</h2>
    <form method="POST" class="form">
        {% include "_task_form.html" %}
        <div class="actions"><button type="submit">💾 حفظ التعديلات</button><a class="small-button cancel" href="{{ url_for('tasks') }}">↩ إلغاء</a></div>
    </form>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
window.EDUPATH_TASK_BANK_OVERRIDES = {{ task_bank_overrides_json|default('{}')|safe }};
window.EDUPATH_APPLY_TASK_BANK_OVERRIDES = function () {
    const overrides = window.EDUPATH_TASK_BANK_OVERRIDES || {};
    window.EDUPATH_TASKS_AR_DATA = window.EDUPATH_TASKS_AR_DATA || {};
    Object.keys(overrides).forEach(function (typeName) {
        if (overrides[typeName] && typeof overrides[typeName] === 'object') {
            window.EDUPATH_TASKS_AR_DATA[typeName] = overrides[typeName];
        }
    });
};
</script>
<script src="{{ url_for('static', filename='js/tasks_native_ar.js') }}?v=5.5.140"></script>
<script>window.EDUPATH_APPLY_TASK_BANK_OVERRIDES && window.EDUPATH_APPLY_TASK_BANK_OVERRIDES();</script>
<script src="{{ url_for('static', filename='js/secondary-school-bank-v55139.js') }}?v=5.5.140"></script>
{% endblock %}
