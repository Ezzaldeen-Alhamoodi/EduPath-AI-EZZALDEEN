{% extends "base.html" %}
{% block page_title %}تعديل المهمة{% endblock %}
{% block content %}
<section class="card">
    <h2>✏️ تعديل المهمة</h2>
    <form method="POST" class="form">
        {% include "_task_form.html" %}
        <div class="actions"><button type="submit">💾 حفظ التعديلات</button><a class="small-button cancel" href="{{ url_for('tasks') }}">↩ إلغاء</a></div>
    </form>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
window.EDUPATH_DEFER_NATIVE_TASKS_INIT = true;
window.EDUPATH_TASK_BANK_OVERRIDES = {{ task_bank_overrides_json|default('{}')|safe }};
</script>
<script src="{{ url_for('static', filename='js/tasks_native_ar.js') }}?v=5.6.9-real-adaptive-admin-editor"></script>
<script src="{{ url_for('static', filename='js/secondary-school-bank-v55139.js') }}?v=5.6.9-real-adaptive-admin-editor"></script>
<script>window.EDUPATH_TASK_BANK_BASE_DATA = JSON.parse(JSON.stringify(window.EDUPATH_TASKS_AR_DATA || {}));</script>
<script src="{{ url_for('static', filename='js/task_bank_runtime.js') }}?v=5.6.9-real-adaptive-admin-editor"></script>
<script>window.EDUPATH_TASK_BANK_BOOT && window.EDUPATH_TASK_BANK_BOOT();</script>
<script src="{{ url_for('static', filename='js/field_labels_only_v566.js') }}?v=5.6.9-real-adaptive-admin-editor"></script>
{% endblock %}
