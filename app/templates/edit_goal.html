{% extends "base.html" %}
{% block page_title %}Edit Goal{% endblock %}
{% block content %}

<section class="card">
    <h2>✏️ Edit Goal</h2>
    <form method="POST" class="form">
        <label>Goal name</label>
        <input name="title" value="{{ goal.title }}">

        <label>Category</label>
        <select name="category">
            {% for c in ["English", "Language", "Programming", "Mathematics", "Scholarship", "AI", "General"] %}
                <option {% if goal.category == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
        </select>

        <label>Current level</label>
        <select name="current_level">
            {% for l in ["Beginner", "Intermediate", "Advanced"] %}
                <option {% if goal.current_level == l %}selected{% endif %}>{{ l }}</option>
            {% endfor %}
        </select>

        <label>Daily minutes</label>
        <input name="daily_minutes" type="number" value="{{ goal.daily_minutes }}" min="15">

        <div class="form-row">
            <div>
                <label>Start date</label>
                <input name="start_date" type="date" value="{{ goal.start_date }}">
            </div>
            <div>
                <label>End date / deadline</label>
                <input name="deadline" type="date" value="{{ goal.deadline }}">
            </div>
        </div>

        <label>Daily reminder time</label>
        <input name="reminder_time" type="time" value="{{ goal.reminder_time }}">

        <label>Notes</label>
        <textarea name="notes" rows="4">{{ goal.notes or "" }}</textarea>

        <div class="actions">
            <button type="submit">💾 Save Changes</button>
            <a class="small-button cancel" href="{{ url_for('goals') }}">↩ Cancel</a>
        </div>
    </form>
</section>

{% endblock %}
