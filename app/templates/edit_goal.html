{% extends "base.html" %}
{% block page_title %}تعديل الهدف{% endblock %}
{% block content %}

<section class="hero compact goals-hero-v41">
    <div>
        <span class="tag">EduPath AI</span>
        <h2>تعديل الهدف الذكي</h2>
        <p>عدّل نفس البيانات التي استخدمتها عند إنشاء الهدف، مع الحفاظ على القوائم التكيفية والربط الذكي في الخلفية.</p>
    </div>
    <a class="button light" href="{{ url_for('goals') }}">↩ العودة إلى الأهداف</a>
</section>

<section class="grid-2 smart-goals-layout-v4613 edit-goal-layout-v525">
    <div class="card smart-goal-create-card">
        <h2>✏️ تعديل الهدف</h2>

        <form method="POST" class="form smart-goal-form-v4613" id="smartGoalForm">
            <div class="goal-field goal-field-wide">
                <label>عنوان الهدف</label>
                <input name="title" id="goalTitleInput" value="{{ goal.title }}" placeholder="مثال: الحصول على IELTS 7 / حفظ جزء عم / إتقان Python Flask" required>
            </div>

            <div class="goal-field goal-field-wide">
                <label>نوع الهدف</label>
                <select name="category" id="goalTypeSelect" data-saved="{{ goal.category or 'التعليم' }}">
                    {% set current_goal_type = goal.category or 'التعليم' %}
                    {% for option in ['التعليم','اللغات','الاختبارات الدولية','البرمجة والتقنية','الذكاء الاصطناعي','المنح الدراسية','الجامعة','الرياضيات','المشاريع','الحياة اليومية','الأهداف الإسلامية','عام','البرمجة والتكنولوجيا','أخرى'] %}
                        <option value="{{ option }}" {% if option == current_goal_type %}selected{% endif %}>{{ option|goals_ar }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="adaptive-goal-panel-v4614" id="adaptiveGoalBox">
                <div class="goal-field">
                    <label id="goalCategoryLabel">تصنيف الهدف</label>
                    <select name="goal_category" id="goalCategorySelect" data-saved="{{ goal.plan.get('Goal Category', '') if goal.plan else '' }}"></select>
                    <div class="inline-custom-field" id="customCategoryBox">
                        <label id="customCategoryLabel">اكتب التصنيف</label>
                        <input name="custom_goal_category" id="customGoalCategoryInput" placeholder="يرجى كتابة ما تريد">
                    </div>
                </div>

                <div class="goal-field">
                    <label id="goalPathLabel">مسار الهدف</label>
                    <select name="goal_path" id="goalPathSelect" data-saved="{{ goal.plan.get('Goal Path', '') if goal.plan else '' }}"></select>
                    <div class="inline-custom-field" id="customPathBox">
                        <label id="customPathLabel">اكتب المسار</label>
                        <input name="custom_goal_path" id="customGoalPathInput" placeholder="يرجى كتابة ما تريد">
                    </div>
                </div>

                <div class="goal-field">
                    <label id="currentStateLabel">الحالة الحالية</label>
                    <select name="current_state" id="currentStateSelect" data-saved="{{ goal.plan.get('Current State', goal.current_level) if goal.plan else goal.current_level }}"></select>
                    <div class="inline-custom-field" id="customCurrentBox">
                        <label id="customCurrentLabel">اكتب الحالة الحالية</label>
                        <input name="custom_current_state" id="customCurrentInput" placeholder="يرجى كتابة ما تريد">
                    </div>
                </div>

                <div class="goal-field">
                    <label id="targetStateLabel">الحالة المستهدفة</label>
                    <select name="target_state" id="targetStateSelect" data-saved="{{ goal.plan.get('Target State', '') if goal.plan else '' }}"></select>
                    <div class="inline-custom-field" id="customTargetBox">
                        <label id="customTargetLabel">اكتب الحالة المستهدفة</label>
                        <input name="custom_target_state" id="customTargetInput" placeholder="يرجى كتابة ما تريد">
                    </div>
                </div>

                <div class="goal-field goal-field-wide">
                    <label id="goalOutcomeLabel">النتيجة المستهدفة</label>
                    <input name="goal_outcome" id="goalOutcomeInput" value="{{ goal.plan.get('Goal Outcome', '') if goal.plan else '' }}" placeholder="ماذا تريد أن يتحقق عند إنجاز هذا الهدف؟">
                </div>

                <input type="hidden" name="milestones" id="milestonesInput" value="{{ goal.plan.get('Milestones', '') if goal.plan else '' }}">

                <div class="goal-field">
                    <label id="commitmentLabel">الالتزام اليومي أو الأسبوعي</label>
                    <select name="commitment" id="commitmentSelect" data-saved="{{ goal.plan.get('Commitment', '') if goal.plan else '' }}"></select>
                    <div class="inline-custom-field" id="customCommitmentBox">
                        <label id="customCommitmentLabel">اكتب الالتزام</label>
                        <input name="custom_commitment" id="customCommitmentInput" placeholder="يرجى كتابة ما تريد">
                    </div>
                </div>

                <input type="hidden" name="keywords" id="goalKeywordsInput">
            </div>

            <div class="goal-form-bottom-grid">
                <div class="goal-field">
                    <label>تاريخ البدء</label>
                    <input name="start_date" type="date" value="{{ goal.start_date }}">
                </div>

                <div class="goal-field">
                    <label>تاريخ الإنجاز المستهدف</label>
                    <input name="deadline" type="date" value="{{ goal.deadline }}">
                </div>

                <div class="goal-field goal-field-wide">
                    <label>ملاحظات إضافية</label>
                    <textarea name="notes" rows="4" placeholder="اكتب أي ملاحظات إضافية أو مصادر أو خطة شخصية...">{{ goal.visible_notes or "" }}</textarea>
                </div>
            </div>

            <div class="actions">
                <button type="submit">💾 حفظ التعديلات</button>
                <a class="small-button cancel" href="{{ url_for('goals') }}">إلغاء</a>
            </div>
        </form>
    </div>
</section>

{% endblock %}
